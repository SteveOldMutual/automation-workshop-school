version: '3.8'

services:
  api:
    build:
      context: ./Automation_School_API
      dockerfile: Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ConnectionString=Server=db;Database=SchoolDB;User=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True
    depends_on:
      - db
    networks:
      - school-network



  ui_react:
    build:
      context: ./react_ui
      dockerfile: Dockerfile
    environment:
      - REACT_APP_API_URL=http://10.129.33.200:5002
    ports:
      - "5001:3000"
    depends_on:
      - api
    networks:
      - school-network

  db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    networks:
      - school-network

networks:
  school-network:
    driver: bridge

volumes:
  sqldata: 