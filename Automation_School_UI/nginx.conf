events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        listen [::]:80;
        server_name localhost;

        location / {
            root /var/www/myblazorapp;
            try_files $uri $uri/ /index.html =404;

            location /myblazorapp/_framework/ {
                gzip_static on;
            }
        }
    }
}